# Pure Intellect Plugin — конфигурация по умолчанию
# Эти значения можно переопределить через Admin Panel PI
# (GET/POST http://PI_SERVER/api/v1/az-plugin/config)

# Адрес PI сервера
# Docker (Windows/Mac): http://host.docker.internal:7860
# Linux host: http://172.17.0.1:7860
# Без Docker: http://localhost:7860
pi_server: "http://host.docker.internal:7860"

# Utility model для Agent Zero (прямой Ollama proxy без памяти)
# Управляется через Admin Panel PI → раздел "Agent Zero Plugin"
utility_model: "qwen3.5:9b"

# Session ID для хранения памяти
session_id: "agent_zero"

# Автоматический recall из PI памяти перед каждым ответом
recall_enabled: true
recall_threshold: 0.4
recall_limit: 5

# Автоматическое сохранение фактов в PI память
memorize_enabled: true
