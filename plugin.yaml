name: _pure_intellect
title: Pure Intellect Memory
description: Connects Agent Zero to Pure Intellect server for persistent hierarchical memory. Replaces built-in memory with PI API for unlimited, cross-session memory with semantic search.
version: 1.1.0
author: Alexander
homepage: https://github.com/Remchik64/pure-intellect
settings_sections:
  - agent
per_project_config: false
per_agent_config: true

default_config:
  pi_server: "http://host.docker.internal:7860"
  recall_enabled: true
  recall_threshold: 0.4
  recall_limit: 5
  memorize_enabled: true
  session_id: "agent_zero"
